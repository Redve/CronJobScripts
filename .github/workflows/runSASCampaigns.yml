name: SAS Campaigns Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
jobs:
  Run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11.6'
      - run: python -m pip install --upgrade pip
      - name: Install all necessary packages
        run: pip install -r ./SASCampaignsChecker/requirements.txt
      - name: execute py script
        run: python ./SASCampaignsChecker/SASCampaignsChecker.py ${{ secrets.TOP_SECRET }} ${{ secrets.TOP_SECRET_2 }} ${{ secrets.TOP_SECRET_3 }}
      - uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

